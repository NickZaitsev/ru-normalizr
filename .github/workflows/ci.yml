name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly run so upstream dependency releases (e.g. num2words, which has no
    # upper bound while tests assert exact output) are caught here, not by users.
    - cron: "0 6 * * 1"

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          # One Windows cell so the primary development OS is exercised in CI.
          - os: windows-latest
            python-version: "3.12"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .
          pip install build

      - name: Lint
        run: python -m ruff check .

      - name: Test
        run: python -m pytest -q

      - name: Build
        run: python -m build .
